services:
  postgres:
    build:
      context: .
      dockerfile: k8s/archive/legacy/db/Dockerfile
    environment:
      POSTGRES_DB: csearch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d csearch"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  scraper:
    build:
      context: .
      dockerfile: backend/scraper/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CONGRESSDIR: /srv/csearch
      POSTGRESURI: postgres
      REDIS_URL: redis://redis:6379
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-change-me-local-postgres}
      DB_NAME: csearch
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      RUN_BILLS: "true"
      RUN_VOTES: "true"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend/scraper/congress:/srv/csearch/congress

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      POSTGRESURI: postgres
      SECRET_KEY: ${SECRET_KEY:-change-me-local-api-secret}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    expose:
      - "3000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    environment:
      NUXT_API_SERVER: /api
      PROXY_API: "http://api:3000/**"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.nuxt
    command: >
      sh -c "npm install && npx nuxt dev --host 0.0.0.0 --port 80"
    depends_on:
      api:
        condition: service_started
    ports:
      - "8080:80"

volumes:
  postgres_data:
