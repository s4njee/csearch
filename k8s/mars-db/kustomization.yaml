apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - sealed-secret-postgres-auth-default.yaml
  - sealed-secret-postgres-auth-postgres-cnpg.yaml
  - pv-orion.yaml
  - pv-apollo.yaml
  - pv-scorpio.yaml
  - cnpg-cluster.yaml
  - cnpg-pooler.yaml

configMapGenerator:
  - name: postgres-schema
    files:
      - 001-schema.sql

generatorOptions:
  disableNameSuffixHash: true
