# ─────────────────────────────────────────────────────────────────────────────
# PgBouncer Connection Pooling (CloudNativePG)
#
# Connect the API to the `csearch-pooler` Service instead of directly to
# pg-cluster-rw. This multiplexes Node.js HTTP connections into a bounded
# set of Postgres sockets.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: csearch-pooler
  namespace: postgres-cnpg
  labels:
    app.kubernetes.io/name: pgbouncer
spec:
  cluster:
    name: pg-cluster
  type: rw
  instances: 2
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "1000"
      default_pool_size: "50"
      server_idle_timeout: "60"
