apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: csearch-pooler
  namespace: default
  labels:
    app.kubernetes.io/name: pgbouncer
spec:
  cluster:
    name: pg-cluster
  type: rw
  instances: 2
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "1000"
      default_pool_size: "50"
      server_idle_timeout: "60"
