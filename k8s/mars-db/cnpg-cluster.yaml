# ─────────────────────────────────────────────────────────────────────────────
# CloudNativePG Cluster — mars context
#
# PREREQUISITE: install the CNPG operator on the mars cluster first:
# kubectl apply --server-side \
#   -f https://github.com/cloudnative-pg/cloudnative-pg/releases/download/v1.29.0/cnpg-1.29.0.yaml
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-cluster
  namespace: postgres-cnpg
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database-ha
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-system-trixie
  imagePullPolicy: IfNotPresent
  storage:
    size: 30Gi
    storageClass: local-path
  bootstrap:
    initdb:
      database: csearch
      owner: postgres
      secret:
        name: postgres-auth
      postInitApplicationSQLRefs:
        configMapRefs:
          - name: postgres-schema
            key: 001-schema.sql
  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: required
    topologyKey: kubernetes.io/hostname
    nodeSelector:
      postgres-role: cnpg
    tolerations:
      - key: dedicated
        operator: Equal
        value: postgres
        effect: NoExecute
  resources:
    requests:
      cpu: "500m"
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"
      work_mem: "16MB"
      maintenance_work_mem: "64MB"
      effective_cache_size: "512MB"
