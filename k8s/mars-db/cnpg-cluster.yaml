# ─────────────────────────────────────────────────────────────────────────────
# CloudNativePG Cluster — mars context
#
# PREREQUISITE: install the CNPG operator on the mars cluster first:
# kubectl apply --server-side \
#   -f https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.22/releases/cnpg-1.22.1.yaml
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-cluster
  namespace: default
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database-ha
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:15.8
  storage:
    size: 30Gi
    storageClass: local-path
  bootstrap:
    initdb:
      database: csearch
      owner: csearch
      # Run schema SQL against the csearch database after initdb completes.
      # The ConfigMap is generated by kustomization.yaml from 001-schema.sql.
      postInitApplicationSQLRefs:
        configMapRefs:
          - name: postgres-schema
            key: 001-schema.sql
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"
      work_mem: "16MB"
      maintenance_work_mem: "64MB"
      effective_cache_size: "512MB"

  # Uncomment to enable automatic daily backups to S3:
  # backup:
  #   barmanObjectStore:
  #     destinationPath: "s3://my-backup-bucket/csearch/"
  #     endpointURL: "https://s3.amazonaws.com"
  #     s3Credentials:
  #       accessKeyId:
  #         name: aws-credentials
  #         key: AWS_ACCESS_KEY_ID
  #       secretAccessKey:
  #         name: aws-credentials
  #         key: AWS_SECRET_ACCESS_KEY
  #     wal:
  #       compression: gzip
