apiVersion: apps/v1
kind: Deployment
metadata:
  name: csearch-api
  labels:
    app.kubernetes.io/name: csearch-api
    app.kubernetes.io/component: api
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: csearch-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: csearch-api
        app.kubernetes.io/component: api
    spec:
      imagePullSecrets:
        - name: registry-s8njee-pull
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: registry.s8njee.com/csearch-api:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "3000"
            - name: LOG_LEVEL
              value: info
            - name: REDIS_URL
              value: "redis://csearch-redis:6379"
            - name: POSTGRESURI
              value: postgres
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-auth
                  key: POSTGRES_PASSWORD
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_DB
          envFrom:
            - secretRef:
                name: csearch-api-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: csearch-api
  labels:
    app.kubernetes.io/name: csearch-api
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/name: csearch-api
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
