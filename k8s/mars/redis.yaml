apiVersion: apps/v1
kind: Deployment
metadata:
  name: csearch-redis
  labels:
    app.kubernetes.io/name: csearch-redis
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: csearch-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: csearch-redis
        app.kubernetes.io/component: cache
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          command:
            - redis-server
            - --maxmemory
            - 128mb
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 192Mi
---
apiVersion: v1
kind: Service
metadata:
  name: csearch-redis
  labels:
    app.kubernetes.io/name: csearch-redis
    app.kubernetes.io/component: cache
spec:
  selector:
    app.kubernetes.io/name: csearch-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  type: ClusterIP
