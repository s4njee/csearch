apiVersion: v1
kind: Service
metadata:
  name: csearch-api-lb
  labels:
    app.kubernetes.io/name: csearch-api
    app.kubernetes.io/component: api
    app.kubernetes.io/instance: mars
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: csearch-api
  ports:
    - name: http
      port: 3000
      targetPort: http
