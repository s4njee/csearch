apiVersion: apps/v1
kind: Deployment
metadata:
  name: csearch-frontend
  labels:
    app.kubernetes.io/name: csearch-frontend
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: csearch-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: csearch-frontend
        app.kubernetes.io/component: frontend
    spec:
      imagePullSecrets:
        - name: registry-s8njee-pull
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: frontend
          image: registry.s8njee.com/csearch-frontend:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NUXT_API_SERVER
              value: http://192.168.1.156:3000
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: csearch-frontend
  labels:
    app.kubernetes.io/name: csearch-frontend
    app.kubernetes.io/component: frontend
spec:
  selector:
    app.kubernetes.io/name: csearch-frontend
  ports:
    - name: http
      port: 4200
      targetPort: http
  type: ClusterIP
