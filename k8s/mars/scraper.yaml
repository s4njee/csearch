apiVersion: batch/v1
kind: CronJob
metadata:
  name: csearch-goscraper
  labels:
    app.kubernetes.io/name: csearch-updater
    app.kubernetes.io/component: scraper
spec:
  schedule: "0 */3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: csearch-updater
            app.kubernetes.io/component: scraper
        spec:
          restartPolicy: OnFailure
          imagePullSecrets:
            - name: registry-s8njee-pull
          dnsConfig:
            options:
              - name: single-request-reopen
              - name: ndots
                value: "1"
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: updater
              image: registry.s8njee.com/csearch-updater:latest
              imagePullPolicy: Always
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                capabilities:
                  drop:
                    - ALL
              env:
                - name: CONGRESSDIR
                  value: /srv/csearch
                - name: POSTGRESURI
                  valueFrom:
                    configMapKeyRef:
                      name: postgres-config
                      key: POSTGRES_RW_HOST
                - name: REDIS_URL
                  value: "redis://csearch-redis:6379"
                - name: LOG_LEVEL
                  value: "info"
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: pg-cluster-app
                      key: username
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: pg-cluster-app
                      key: password
                - name: DB_NAME
                  valueFrom:
                    secretKeyRef:
                      name: pg-cluster-app
                      key: dbname
                - name: RUN_BILLS
                  value: "true"
                - name: RUN_VOTES
                  value: "true"
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                limits:
                  cpu: "2"
                  memory: 4Gi
              volumeMounts:
                - name: congress-code
                  mountPath: /srv/csearch/congress
                - name: congress-data
                  mountPath: /srv/csearch/data
          volumes:
            - name: congress-code
              hostPath:
                path: /home/sanjee/congress
                type: Directory
            - name: congress-data
              hostPath:
                path: /home/sanjee/congress/data
                type: DirectoryOrCreate
