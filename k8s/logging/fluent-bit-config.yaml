apiVersion: v1
kind: ConfigMap
metadata:
  name: csearch-fluent-bit-config
  labels:
    app.kubernetes.io/name: csearch-fluent-bit
    app.kubernetes.io/component: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Daemon        Off
        Log_Level     info
        Parsers_File   parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020
        storage.path  /var/fluent-bit/state

    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            cri
        DB                /var/fluent-bit/state/tail.db
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  10
        Rotate_Wait       30
        storage.type      filesystem

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

    [FILTER]
        Name                grep
        Match               kube.*
        Regex               $kubernetes['labels']['app.kubernetes.io/name'] ^csearch-api$
        Regex               msg ^request completed$
        Exclude             route ^/health$

    [OUTPUT]
        Name          http
        Match         kube.*
        Host          ${LOG_SHIP_HTTP_HOST}
        Port          ${LOG_SHIP_HTTP_PORT}
        URI           ${LOG_SHIP_HTTP_URI}
        Format        json_lines
        Json_Date_Key timestamp
        Json_Date_Format iso8601
        tls           ${LOG_SHIP_HTTP_TLS}
        tls.verify    ${LOG_SHIP_HTTP_TLS_VERIFY}
        Header        X-Source csearch
        Header        X-Cluster ${CLUSTER_NAME}
        Retry_Limit   False

  parsers.conf: |
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
        Time_Keep   On
