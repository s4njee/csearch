apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: csearch-fluent-bit
  labels:
    app.kubernetes.io/name: csearch-fluent-bit
    app.kubernetes.io/component: logging
spec:
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: csearch-fluent-bit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: csearch-fluent-bit
        app.kubernetes.io/component: logging
    spec:
      serviceAccountName: csearch-fluent-bit
      terminationGracePeriodSeconds: 30
      tolerations:
        - operator: Exists
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fluent-bit
          image: cr.fluentbit.io/fluent/fluent-bit:3.1.10
          imagePullPolicy: IfNotPresent
          args:
            - -c
            - /fluent-bit/etc/fluent-bit.conf
          env:
            - name: FLUENT_BIT_LOG_LEVEL
              value: info
            - name: LOG_S3_BUCKET
              value: "${LOG_S3_BUCKET}"
            - name: LOG_S3_REGION
              value: "${LOG_S3_REGION}"
            - name: LOG_S3_TOTAL_FILE_SIZE
              value: "${LOG_S3_TOTAL_FILE_SIZE}"
            - name: LOG_S3_UPLOAD_TIMEOUT
              value: "${LOG_S3_UPLOAD_TIMEOUT}"
            - name: LOG_S3_USE_PUT_OBJECT
              value: "${LOG_S3_USE_PUT_OBJECT}"
            - name: LOG_S3_STORE_DIR_LIMIT_SIZE
              value: "${LOG_S3_STORE_DIR_LIMIT_SIZE}"
            - name: LOG_SHIP_HTTP_HOST
              value: "${LOG_SHIP_HTTP_HOST}"
            - name: LOG_SHIP_HTTP_PORT
              value: "${LOG_SHIP_HTTP_PORT}"
            - name: LOG_SHIP_HTTP_URI
              value: "${LOG_SHIP_HTTP_URI}"
            - name: LOG_SHIP_HTTP_TLS
              value: "${LOG_SHIP_HTTP_TLS}"
            - name: LOG_SHIP_HTTP_TLS_VERIFY
              value: "${LOG_SHIP_HTTP_TLS_VERIFY}"
            - name: CLUSTER_NAME
              value: csearch
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: csearch-fluent-bit-aws
                  key: aws_access_key_id
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: csearch-fluent-bit-aws
                  key: aws_secret_access_key
                  optional: true
            - name: AWS_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: csearch-fluent-bit-aws
                  key: aws_session_token
                  optional: true
          ports:
            - name: http-metrics
              containerPort: 2020
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http-metrics
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http-metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc/fluent-bit.conf
              subPath: fluent-bit.conf
              readOnly: true
            - name: config
              mountPath: /fluent-bit/etc/parsers.conf
              subPath: parsers.conf
              readOnly: true
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: state
              mountPath: /var/fluent-bit/state
            - name: s3-buffer
              mountPath: /var/fluent-bit/s3
      volumes:
        - name: config
          configMap:
            name: csearch-fluent-bit-config
        - name: varlog
          hostPath:
            path: /var/log
            type: Directory
        - name: state
          emptyDir: {}
        - name: s3-buffer
          emptyDir: {}
