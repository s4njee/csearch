apiVersion: v1
kind: ConfigMap
metadata:
  name: csearch-fluent-bit-config
  labels:
    app.kubernetes.io/name: csearch-fluent-bit
    app.kubernetes.io/component: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush                 1
        Daemon                Off
        Log_Level             info
        Parsers_File          parsers.conf
        HTTP_Server           On
        HTTP_Listen           0.0.0.0
        HTTP_Port             2020
        storage.path          /var/fluent-bit/state

    [INPUT]
        Name                  tail
        Tag                   kube.*
        Path                  /var/log/containers/*.log
        Parser                cri
        DB                    /var/fluent-bit/state/tail.db
        Mem_Buf_Limit         10MB
        Skip_Long_Lines       On
        Refresh_Interval      10
        Rotate_Wait           30
        storage.type          filesystem

    [FILTER]
        Name                  kubernetes
        Match                 kube.*
        Kube_URL              https://kubernetes.default.svc:443
        Kube_CA_File          /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File       /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix       kube.var.log.containers.
        Merge_Log             On
        Keep_Log              Off
        K8S-Logging.Parser    On
        K8S-Logging.Exclude   On

    [FILTER]
        Name                  grep
        Match                 kube.*
        Regex                 $kubernetes['labels']['app.kubernetes.io/name'] ^(csearch-api|csearch-updater)$

    [OUTPUT]
        Name                  s3
        Match                 kube.*
        Bucket                ${LOG_S3_BUCKET}
        Region                ${LOG_S3_REGION}
        Compression           gzip
        Store_Dir             /var/fluent-bit/s3
        Store_Dir_Limit_Size  ${LOG_S3_STORE_DIR_LIMIT_SIZE}
        Total_File_Size       ${LOG_S3_TOTAL_FILE_SIZE}
        Upload_Timeout        ${LOG_S3_UPLOAD_TIMEOUT}
        Use_Put_Object        ${LOG_S3_USE_PUT_OBJECT}
        Preserve_Data_Ordering On
        S3_Key_Format         /${CLUSTER_NAME}/$TAG/%Y/%m/%d/%H/%M/%S/$UUID.gz
        Static_File_Path      Off
        Retry_Limit           False

  parsers.conf: |
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
        Time_Keep   On
