apiVersion: apps/v1
kind: Deployment
metadata:
  name: csearch-log-collector
  labels:
    app.kubernetes.io/name: csearch-log-collector
    app.kubernetes.io/component: logging
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: csearch-log-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: csearch-log-collector
        app.kubernetes.io/component: logging
    spec:
      containers:
        - name: collector
          image: ${REGISTRY}/csearch-log-collector:latest
          imagePullPolicy: Always
          env:
            - name: LOG_COLLECTOR_DIR
              value: /var/log/csearch-collector
            - name: LOG_COLLECTOR_LISTEN_ADDR
              value: :8080
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /var/log/csearch-collector
      imagePullSecrets:
        - name: registry-s8njee-pull
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: data
          hostPath:
            path: ${LOG_COLLECTOR_HOSTPATH}
            type: DirectoryOrCreate
