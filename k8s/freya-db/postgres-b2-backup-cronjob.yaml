apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-b2-backup
  labels:
    app.kubernetes.io/name: postgres-b2-backup
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: csearch
spec:
  schedule: "17 7 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: postgres-b2-backup
            app.kubernetes.io/component: backup
            app.kubernetes.io/part-of: csearch
        spec:
          restartPolicy: OnFailure
          nodeSelector:
            kubernetes.io/hostname: freya
          imagePullSecrets:
            - name: registry-s8njee-pull
          securityContext:
            fsGroup: 999
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: pg-basebackup
              image: registry.s8njee.com/csearch-postgres:latest
              imagePullPolicy: Always
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 999
                runAsGroup: 999
                capabilities:
                  drop:
                    - ALL
              envFrom:
                - configMapRef:
                    name: postgres-config
                - secretRef:
                    name: postgres-auth
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  export PGPASSWORD="$POSTGRES_PASSWORD"
                  until pg_isready -h "$POSTGRES_RW_HOST" -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                    sleep 2
                  done
                  backup_dir="/backup/csearch-basebackup-$(date -u +%Y%m%dT%H%M%SZ)"
                  mkdir -p "$backup_dir"
                  pg_basebackup \
                    --host="$POSTGRES_RW_HOST" \
                    --username="$POSTGRES_USER" \
                    --pgdata="$backup_dir" \
                    --format=tar \
                    --wal-method=stream \
                    --checkpoint=fast \
                    --progress \
                    --verbose
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
              volumeMounts:
                - mountPath: /backup
                  name: backup-workdir
          containers:
            - name: restic
              image: restic/restic:0.17.3
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 999
                runAsGroup: 999
                capabilities:
                  drop:
                    - ALL
              env:
                - name: RESTIC_REPOSITORY
                  valueFrom:
                    secretKeyRef:
                      name: postgres-b2-backup
                      key: RESTIC_REPOSITORY
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-b2-backup
                      key: RESTIC_PASSWORD
                - name: B2_ACCOUNT_ID
                  valueFrom:
                    secretKeyRef:
                      name: postgres-b2-backup
                      key: B2_ACCOUNT_ID
                - name: B2_ACCOUNT_KEY
                  valueFrom:
                    secretKeyRef:
                      name: postgres-b2-backup
                      key: B2_ACCOUNT_KEY
                - name: RESTIC_CACHE_DIR
                  value: /cache
                - name: RESTIC_KEEP_LAST
                  value: "8"
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  backup_path="$(find /backup -mindepth 1 -maxdepth 1 -type d -name 'csearch-basebackup-*' | sort | tail -n 1)"
                  test -n "$backup_path"
                  restic snapshots >/dev/null 2>&1 || restic init
                  restic backup "$backup_path" --tag postgres --tag freya --tag csearch --tag physical --host csearch-freya
                  /scripts/prune-b2-backups.sh
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
              volumeMounts:
                - mountPath: /backup
                  name: backup-workdir
                  readOnly: true
                - mountPath: /cache
                  name: restic-cache
                - mountPath: /scripts/prune-b2-backups.sh
                  name: postgres-backup-scripts
                  subPath: prune-b2-backups.sh
                  readOnly: true
          volumes:
            - name: backup-workdir
              emptyDir:
                sizeLimit: 80Gi
            - name: restic-cache
              emptyDir: {}
            - name: postgres-backup-scripts
              configMap:
                name: postgres-backup-scripts
                defaultMode: 0555
