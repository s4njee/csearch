apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-audit-history-migration
  labels:
    app.kubernetes.io/name: postgres-audit-history-migration
    app.kubernetes.io/component: migration
    app.kubernetes.io/part-of: csearch
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-audit-history-migration
        app.kubernetes.io/component: migration
        app.kubernetes.io/part-of: csearch
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        kubernetes.io/hostname: freya
      imagePullSecrets:
        - name: registry-s8njee-pull
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: registry.s8njee.com/csearch-postgres:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: postgres-config
            - secretRef:
                name: postgres-auth
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              export PGPASSWORD="$POSTGRES_PASSWORD"
              until pg_isready -h "$POSTGRES_RW_HOST" -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                sleep 2
              done
              psql \
                -v ON_ERROR_STOP=1 \
                -h "$POSTGRES_RW_HOST" \
                -U "$POSTGRES_USER" \
                -d "$POSTGRES_DB" \
                -f /migrations/002-audit-history.sql
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - mountPath: /migrations
              name: postgres-schema
              readOnly: true
      volumes:
        - name: postgres-schema
          configMap:
            name: postgres-schema
