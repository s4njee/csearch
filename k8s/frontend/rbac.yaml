apiVersion: v1
kind: ServiceAccount
metadata:
  name: csearch-frontend-deployer
  labels:
    app.kubernetes.io/name: csearch-frontend-deployer
    app.kubernetes.io/component: deployer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: csearch-frontend-deployer
  labels:
    app.kubernetes.io/name: csearch-frontend-deployer
    app.kubernetes.io/component: deployer
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: csearch-frontend-deployer
  labels:
    app.kubernetes.io/name: csearch-frontend-deployer
    app.kubernetes.io/component: deployer
subjects:
  - kind: ServiceAccount
    name: csearch-frontend-deployer
roleRef:
  kind: Role
  name: csearch-frontend-deployer
  apiGroup: rbac.authorization.k8s.io
