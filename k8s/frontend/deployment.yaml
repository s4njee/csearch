apiVersion: apps/v1
kind: Deployment
metadata:
  name: csearch-frontend
  labels:
    app.kubernetes.io/name: csearch-frontend
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: csearch-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: csearch-frontend
        app.kubernetes.io/component: frontend
    spec:
      imagePullSecrets:
        - name: registry-s8njee-pull
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: registry.s8njee.com/csearch-frontend:latest
          imagePullPolicy: Always
          env:
            # Official cluster deployment should point at the public API origin.
            - name: NUXT_API_SERVER
              value: https://api.csearch.org
          ports:
            - name: http
              containerPort: 80
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: csearch-frontend
  labels:
    app.kubernetes.io/name: csearch-frontend
    app.kubernetes.io/component: frontend
spec:
  selector:
    app.kubernetes.io/name: csearch-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
