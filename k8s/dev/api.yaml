apiVersion: v1
kind: Service
metadata:
  name: api-dev
spec:
  selector:
    app: api-dev
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-dev
  template:
    metadata:
      labels:
        app: api-dev
    spec:
      containers:
        - name: api
          image: registry.s8njee.com/csearch-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
            - name: POSTGRESURI
              value: postgres-dev
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: password
            - name: DB_NAME
              value: csearch
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
