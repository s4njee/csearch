apiVersion: v1
kind: Secret
metadata:
  name: postgres-auth
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
type: Opaque
stringData:
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
data:
  POSTGRES_DB: csearch
  POSTGRES_USER: postgres
  PGDATA: /var/lib/postgresql/data/pgdata
