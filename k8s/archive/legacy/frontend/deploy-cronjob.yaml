apiVersion: batch/v1
kind: CronJob
metadata:
  name: csearch-frontend-deployer
  labels:
    app.kubernetes.io/name: csearch-frontend-deployer
    app.kubernetes.io/component: deployer
spec:
  timeZone: "America/Chicago"
  # Runs one hour after the scraper CronJob, both in Central Time.
  schedule: "0 1 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: csearch-frontend-deployer
        spec:
          restartPolicy: OnFailure
          # Optionally wait for the scraper job to finish using an init container if you have a way to check,
          # but a 30-minute delay is the simplest and most common Kubernetes CronJob sequencing pattern.
          serviceAccountName: csearch-frontend-deployer
          imagePullSecrets:
            - name: registry-s8njee-pull
          containers:
            - name: deployer
              image: registry.s8njee.com/csearch-frontend:latest
              imagePullPolicy: Always
              env:
                # Fetch AWS credentials from a Kubernetes Secret (you will need to create this secret)
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: aws-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aws-credentials
                      key: AWS_SECRET_ACCESS_KEY
                
                # S3 configuration
                - name: S3_BUCKET
                  valueFrom:
                    configMapKeyRef:
                      name: csearch-deploy-config
                      key: S3_BUCKET
                - name: CF_DIST_CSEARCH
                  valueFrom:
                    configMapKeyRef:
                      name: csearch-deploy-config
                      key: CF_DIST_CSEARCH
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: "2"
                  memory: 2Gi
