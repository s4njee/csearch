apiVersion: batch/v1
kind: Job
metadata:
  name: csearch-updater-runtime-sync
  labels:
    app.kubernetes.io/name: csearch-updater
    app.kubernetes.io/component: runtime-sync
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: csearch-updater
        app.kubernetes.io/component: runtime-sync
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: registry-s8njee-pull
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sync
          image: registry.s8njee.com/csearch-updater:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -eu
              mkdir -p /srv/csearch/congress/tasks /srv/csearch/congress/congress/tasks
              cp /opt/csearch/congress/tasks/votes.py /srv/csearch/congress/tasks/votes.py
              if [ -f /opt/csearch/congress/congress/tasks/votes.py ]; then
                cp /opt/csearch/congress/congress/tasks/votes.py /srv/csearch/congress/congress/tasks/votes.py
              fi
              python3 -m py_compile /srv/csearch/congress/tasks/votes.py
              if [ -f /srv/csearch/congress/congress/tasks/votes.py ]; then
                python3 -m py_compile /srv/csearch/congress/congress/tasks/votes.py
              fi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: congress-code
              mountPath: /srv/csearch/congress
      volumes:
        - name: congress-code
          hostPath:
            path: /root/congress
            type: Directory
