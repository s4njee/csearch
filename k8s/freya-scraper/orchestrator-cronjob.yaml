apiVersion: batch/v1
kind: CronJob
metadata:
  name: csearch-data-pipeline
  labels:
    app.kubernetes.io/name: csearch-data-pipeline
    app.kubernetes.io/component: scraper-nlp-orchestrator
spec:
  timeZone: "America/Chicago"
  # GovInfo BILLSTATUS typically updates later in the early morning, so run after that window.
  schedule: "0 5 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 43200
      template:
        metadata:
          labels:
            app.kubernetes.io/name: csearch-data-pipeline
            app.kubernetes.io/component: scraper-nlp-orchestrator
        spec:
          restartPolicy: OnFailure
          imagePullSecrets:
            - name: registry-s8njee-pull
          dnsConfig:
            options:
              - name: single-request-reopen
              - name: ndots
                value: "1"
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: scraper
              image: registry.s8njee.com/csearch-updater:latest
              imagePullPolicy: Always
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                capabilities:
                  drop:
                    - ALL
              env:
                - name: CONGRESSDIR
                  value: /srv/csearch
                - name: POSTGRESURI
                  valueFrom:
                    configMapKeyRef:
                      name: postgres-config
                      key: POSTGRES_RW_HOST
                - name: REDIS_URL
                  value: "redis://csearch-redis:6379"
                - name: LOG_LEVEL
                  value: "info"
                - name: DB_USER
                  valueFrom:
                    configMapKeyRef:
                      name: postgres-config
                      key: POSTGRES_USER
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-auth
                      key: POSTGRES_PASSWORD
                - name: DB_NAME
                  valueFrom:
                    configMapKeyRef:
                      name: postgres-config
                      key: POSTGRES_DB
                - name: RUN_BILLS
                  value: "true"
                - name: RUN_VOTES
                  value: "true"
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                limits:
                  cpu: "2"
                  memory: 4Gi
              volumeMounts:
                - name: congress-code
                  mountPath: /srv/csearch/congress
                - name: congress-data
                  mountPath: /srv/csearch/data
                - name: congress-data
                  mountPath: /srv/csearch/congress/data
          containers:
            - name: nlp-updater
              image: registry.s8njee.com/csearch-tarp-updater:latest
              imagePullPolicy: Always
              command:
                - /bin/bash
                - -lc
              args:
                - |
                  set -euo pipefail
                  export CONGRESS="${CONGRESS:-$(( ( $(date +%Y) - 1789 ) / 2 + 1 ))}"
                  export PG_CONNECTION_STRING="$(
                    python - <<'PY'
                  import os
                  from urllib.parse import quote

                  user = quote(os.environ["DB_USER"], safe="")
                  password = quote(os.environ["DB_PASSWORD"], safe="")
                  host = os.environ["POSTGRESURI"]
                  port = os.environ["DB_PORT"]
                  db_name = quote(os.environ["DB_NAME"], safe="")
                  print(f"postgresql://{user}:{password}@{host}:{port}/{db_name}")
                  PY
                  )"
                  exec bash /app/nightly_update.sh
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              env:
                - name: CONGRESS_DATA_ROOT
                  value: /congress-data
                - name: DATA_DIR
                  value: /app/data
                - name: POSTGRESURI
                  valueFrom:
                    configMapKeyRef:
                      name: postgres-config
                      key: POSTGRES_RW_HOST
                - name: DB_PORT
                  value: "5432"
                - name: DB_USER
                  valueFrom:
                    configMapKeyRef:
                      name: postgres-config
                      key: POSTGRES_USER
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-auth
                      key: POSTGRES_PASSWORD
                - name: DB_NAME
                  valueFrom:
                    configMapKeyRef:
                      name: postgres-config
                      key: POSTGRES_DB
                - name: OPENAI_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: csearch-api-openai
                      key: OPENAI_API_KEY
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: "2"
                  memory: 6Gi
              volumeMounts:
                - name: congress-data
                  mountPath: /congress-data
                  readOnly: true
                - name: tarp-data
                  mountPath: /app/data
          volumes:
            - name: congress-code
              hostPath:
                path: /root/congress
                type: Directory
            - name: congress-data
              hostPath:
                path: /root/congress/data
                type: DirectoryOrCreate
            - name: tarp-data
              hostPath:
                path: /root/congress/data/tarp
                type: DirectoryOrCreate
