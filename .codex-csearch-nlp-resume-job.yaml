apiVersion: batch/v1
kind: Job
metadata:
  name: csearch-nlp-resume-20260421-embed-upsert
  labels:
    app.kubernetes.io/name: csearch-nlp-resume
    app.kubernetes.io/component: nlp-embed-upsert
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 21600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: csearch-nlp-resume
        app.kubernetes.io/component: nlp-embed-upsert
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: registry-s8njee-pull
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nlp-resume
          image: registry.s8njee.com/csearch-tarp-updater:latest
          imagePullPolicy: Always
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export CONGRESS=119
              export PG_CONNECTION_STRING="postgresql://${DB_USER}:${DB_PASSWORD}@${POSTGRESURI}:${DB_PORT}/${DB_NAME}"
              cd /app
              python embedder.py \
                --input "$DATA_DIR/processed_chunks/$CONGRESS" \
                --output "$DATA_DIR/embedded_chunks/$CONGRESS"
              python upserter.py \
                --input "$DATA_DIR/embedded_chunks/$CONGRESS" \
                --skip-hnsw \
                --batch-size 2000
          env:
            - name: DATA_DIR
              value: /app/data
            - name: POSTGRESURI
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_RW_HOST
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-auth
                  key: POSTGRES_PASSWORD
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_DB
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: csearch-api-openai
                  key: OPENAI_API_KEY
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 6Gi
          volumeMounts:
            - name: tarp-data
              mountPath: /app/data
      volumes:
        - name: tarp-data
          hostPath:
            path: /root/congress/data/tarp
            type: DirectoryOrCreate
