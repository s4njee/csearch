apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: csearch-netcup-test-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/s4njee/csearch.git
    targetRevision: codex/claude
    path: k8s/netcup-test-frontend
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
