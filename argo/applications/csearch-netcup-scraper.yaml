apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: csearch-netcup-scraper
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://github.com/s4njee/csearch.git
    targetRevision: main
    path: k8s/netcup-scraper
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
