apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: csearch-netcup-core
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd-image-updater.argoproj.io/image-list: fastapi=registry.s8njee.com/csearch-fastapi
    argocd-image-updater.argoproj.io/fastapi.pull-secret: pullsecret:argocd/registry-s8njee-pull
    argocd-image-updater.argoproj.io/fastapi.update-strategy: digest
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/s4njee/csearch.git
    targetRevision: main
    path: k8s/netcup-core
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
