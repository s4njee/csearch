name: Build And Deploy Mars Images

on:
  push:
    branches:
      - main
      - optimize
    paths:
      - ".github/workflows/mars-images.yml"
      - "backend/api/**"
      - "backend/scraper/**"
      - "backend/scraper/explore.sql"
      - "frontend/**"
      - "k8s/mars/**"
      - "k8s/netcup-test-frontend/**"
      - "argo/applications/csearch-mars-core.yaml"
      - "argo/applications/csearch-netcup-test-frontend.yaml"
  workflow_dispatch:

permissions:
  contents: write

env:
  REGISTRY: registry.s8njee.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Sync shared SQL into API build context
        run: |
          mkdir -p backend/api/sql
          cp backend/scraper/explore.sql backend/api/sql/explore.sql

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: backend/api
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/csearch-api:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/csearch-api:latest

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile.nginx
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/csearch-frontend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/csearch-frontend:latest

  build-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push scraper image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/scraper/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
          tags: |
            ${{ env.REGISTRY }}/csearch-updater:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/csearch-updater:latest

  update-mars-manifests:
    runs-on: ubuntu-latest
    needs:
      - build-api
      - build-frontend
      - build-scraper
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Argo-managed image tags
        run: |
          sed -i.bak "s|newTag: .*|newTag: ${IMAGE_TAG}|g" k8s/mars/kustomization.yaml
          rm -f k8s/mars/kustomization.yaml.bak
          sed -i.bak "s|newTag: .*|newTag: ${IMAGE_TAG}|g" k8s/netcup-test-frontend/kustomization.yaml
          rm -f k8s/netcup-test-frontend/kustomization.yaml.bak

      - name: Commit updated tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/mars/kustomization.yaml k8s/netcup-test-frontend/kustomization.yaml
          git diff --cached --quiet && exit 0
          git commit -m "chore: update Argo image tags [skip ci]"
          git push
