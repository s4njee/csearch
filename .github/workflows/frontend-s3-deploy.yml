name: Deploy Frontend To S3

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/frontend-s3-deploy.yml"
      - "frontend/**"
  schedule:
    # GitHub Actions cron uses UTC and cannot track America/Chicago DST directly.
    # 11:00 UTC is one hour after the 5:00 AM America/Chicago scraper during CDT.
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-s3-production
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || env.AWS_REGION }}

      - name: Write deploy environment file
        run: |
          cat > .env.prod <<EOF
          S3_BUCKET=${{ vars.S3_BUCKET }}
          CF_DIST_CSEARCH=${{ vars.CF_DIST_CSEARCH }}
          NUXT_API_SERVER=${{ vars.NUXT_API_SERVER }}
          EOF

      - name: Deploy frontend to S3 and CloudFront
        run: bash frontend/deploy.sh

      - name: Remove temporary deploy environment file
        if: always()
        run: rm -f .env.prod
