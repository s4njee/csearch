name: Deploy Frontend To Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/frontend-cloudflare-deploy.yml"
      - "frontend/**"
  schedule:
    # GitHub Actions cron uses UTC and cannot track America/Chicago DST directly.
    # 12:00 UTC runs at 7:00 AM during CDT and 6:00 AM during CST,
    # keeping the deploy one to two hours after the 5:00 AM America/Chicago scraper.
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Write deploy environment file
        run: |
          cat > .env.prod <<EOF
          NUXT_API_SERVER=${{ vars.NUXT_API_SERVER }}
          CF_PAGES_PROJECT=${{ vars.CF_PAGES_PROJECT }}
          EOF

      - name: Deploy frontend to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bash frontend/deploy.sh

      - name: Remove temporary deploy environment file
        if: always()
        run: rm -f .env.prod
