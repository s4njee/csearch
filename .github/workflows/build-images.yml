name: Build Images

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-images.yml"
      - "backend/api/**"
      - "backend/scraper/**"
      - "backend/nlp/**"
      - "frontend/**"
  workflow_dispatch:

env:
  REGISTRY: registry.s8njee.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push FastAPI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/csearch-fastapi:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/csearch-fastapi:latest

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile.nginx
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/csearch-frontend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/csearch-frontend:latest

  build-tarp-updater:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push upserter image
        uses: docker/build-push-action@v6
        with:
          context: backend/nlp/project-tarp
          file: backend/nlp/project-tarp/Dockerfile.upserter
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/csearch-upserter:latest

      - name: Build and push tarp-updater image
        uses: docker/build-push-action@v6
        with:
          context: backend/nlp/project-tarp
          file: backend/nlp/project-tarp/Dockerfile.nightly-updater
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/csearch-tarp-updater:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/csearch-tarp-updater:latest

  build-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push scraper image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/scraper/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
          tags: |
            ${{ env.REGISTRY }}/csearch-updater:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/csearch-updater:latest
