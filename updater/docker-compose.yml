services:
  postgres:
    build:
      context: ..
      dockerfile: updater/postgres/Dockerfile
    environment:
      POSTGRES_DB: csearch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d csearch"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  updater:
    build:
      context: ..
      dockerfile: updater/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CONGRESSDIR: /srv/csearch
      POSTGRESURI: postgres
      RUN_BILLS: "true"
      RUN_VOTES: "false"
    volumes:
      - updater_state:/srv/csearch
    restart: "no"

volumes:
  postgres_data:
  updater_state:
